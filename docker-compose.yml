services:
  # 1. Servidor de Descubrimiento
  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - helpdesk-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://10.2.1.203:8761"]
      interval: 30s
      timeout: 10s
      retries: 5

  # 2. Servidor de Configuración
  config-server:
    build: ./config-server
    container_name: config-server
    ports:
      - "8888:8888"
    volumes:
      - ./config-repo:/config-repo
    depends_on:
      eureka-server:
        condition: service_healthy
    environment:
      - SPRING_CLOUD_CONFIG_SERVER_NATIVE_SEARCH_LOCATIONS=file:///config-repo
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka
    networks:
      - helpdesk-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://config-server:8888/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # 3. Base de Datos MySQL
  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=3Nf4rm1t3c1root5
      - MYSQL_DATABASE=helpdesk_db
    volumes:
      - ./mysql-data:/var/lib/mysql
    networks:
      - helpdesk-network
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "mysql-db", "-p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # 4. API Gateway
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      config-server:
        condition: service_healthy
    environment:
      - SPRING_CLOUD_CONFIG_URI=http://config-server:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka
    networks:
      - helpdesk-network

  # 5. Servicios de Negocio
  user-management-service:
    build: ./user-management-service
    container_name: user-management-service
    ports:
      - "8083:8083"
    depends_on:
      mysql-db:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      - JWT_SECRET=M05mNHJtMXQzYzFyb290NSUkQ2VudHJhbEluZm9ybWF0aWNhVW5pZGFkVGVjbm9sb2dpYWRlbGFJbmZvcm1hY2lvbnlDb211bmljYWNpb25lcw==
      - SPRING_CLOUD_CONFIG_URI=http://config-server:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka
    networks:
      - helpdesk-network

  asset-management-service:
    build: ./asset-management-service
    container_name: asset-management-service
    depends_on:
      mysql-db:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      - SPRING_CLOUD_CONFIG_URI=http://config-server:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka
    networks:
      - helpdesk-network

  # --- AÑADIDO: Device Management Service ---
  device-management-service:
    build: ./device-management-service
    container_name: device-management-service
    depends_on:
      mysql-db:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      - SPRING_CLOUD_CONFIG_URI=http://config-server:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka
    networks:
      - helpdesk-network

  helpdesk-ticket-service:
    build: ./helpdesk-ticket-service
    container_name: helpdesk-ticket-service
    depends_on:
      mysql-db:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      - SPRING_CLOUD_CONFIG_URI=http://config-server:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka
    networks:
      - helpdesk-network


networks:
  helpdesk-network:
    driver: bridge
