# Configuraci�n para el API Gateway
server.port=8080

# Conexi�n a Eureka
eureka.client.serviceUrl.defaultZone=http://eureka-server:8761/eureka
spring.cloud.client.hostname=10.2.1.203
eureka.instance.prefer-ip-address=false
eureka.instance.hostname=10.2.1.203

# ========================================
# Reenvío de headers (fix Swagger desde host externo)
# ========================================
spring.cloud.gateway.forwarded.enabled=true
spring.cloud.gateway.x-forwarded.enabled=true
spring.cloud.gateway.x-forwarded.host-enabled=true
spring.cloud.gateway.x-forwarded.port-enabled=true
spring.cloud.gateway.x-forwarded.proto-enabled=true

# ========================================
# ? Rutas de negocio (Gateway Routes)
# ========================================

# --- CORS Configuration ---
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOriginPatterns=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true

# --- USER-MANAGEMENT-SERVICE ---
# Redirige /api/auth/** y /api/usuarios/**. NO se elimina el prefijo /api.
spring.cloud.gateway.routes[0].id=user-service-route
spring.cloud.gateway.routes[0].uri=lb://USER-MANAGEMENT-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**, /api/usuarios/**

# --- ASSET-MANAGEMENT-SERVICE ---
# Redirige /api/equipos/** -> Elimina /api -> Llama a /equipos/** en el microservicio
spring.cloud.gateway.routes[1].id=asset-service-route
spring.cloud.gateway.routes[1].uri=lb://ASSET-MANAGEMENT-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/equipos/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=1

# --- HELPDESK-TICKET-SERVICE ---
# Redirige /api/tickets/** -> Elimina /api -> Llama a /tickets/** en el microservicio
spring.cloud.gateway.routes[2].id=ticket-service-route
spring.cloud.gateway.routes[2].uri=lb://HELPDESK-TICKET-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/tickets/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=1

# --- DEVICE-MANAGEMENT-SERVICE ---
# Redirige /api/dispositivos/** -> Elimina /api -> Llama a /dispositivos/** en el microservicio
spring.cloud.gateway.routes[3].id=device-service-route
spring.cloud.gateway.routes[3].uri=lb://DEVICE-MANAGEMENT-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/dispositivos/**
spring.cloud.gateway.routes[3].filters[0]=StripPrefix=1


# ========================================
# ? Configuraci�n general de OpenAPI / Swagger
# ========================================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
#springdoc.swagger-ui.url=/v3/api-docs
springdoc.swagger-ui.config-url=/v3/api-docs/swagger-config

# ========================================
# ? Grupos de Swagger (dropdown en UI)
# ========================================
springdoc.swagger-ui.urls[0].name=User Management Service
springdoc.swagger-ui.urls[0].url=/v3/api-docs/user-management-service

springdoc.swagger-ui.urls[1].name=Asset Management Service
springdoc.swagger-ui.urls[1].url=/v3/api-docs/asset-management-service

springdoc.swagger-ui.urls[2].name=Helpdesk Ticket Service
springdoc.swagger-ui.urls[2].url=/v3/api-docs/helpdesk-ticket-service

springdoc.swagger-ui.urls[3].name=Device Management Service
springdoc.swagger-ui.urls[3].url=/v3/api-docs/device-management-service


# ========================================
# ? Rutas para exposiciones de API Docs (Gateway Proxy)
# ========================================

# --- User Management API Docs ---
spring.cloud.gateway.routes[4].id=user-management-api-docs
spring.cloud.gateway.routes[4].uri=lb://USER-MANAGEMENT-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/v3/api-docs/user-management-service
spring.cloud.gateway.routes[4].filters[0]=RewritePath=/v3/api-docs/user-management-service,/v3/api-docs

# --- Asset Management API Docs ---
spring.cloud.gateway.routes[5].id=asset-management-api-docs
spring.cloud.gateway.routes[5].uri=lb://ASSET-MANAGEMENT-SERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/v3/api-docs/asset-management-service
spring.cloud.gateway.routes[5].filters[0]=RewritePath=/v3/api-docs/asset-management-service,/v3/api-docs

# --- Helpdesk Ticket API Docs ---
spring.cloud.gateway.routes[6].id=helpdesk-ticket-api-docs
spring.cloud.gateway.routes[6].uri=lb://HELPDESK-TICKET-SERVICE
spring.cloud.gateway.routes[6].predicates[0]=Path=/v3/api-docs/helpdesk-ticket-service
spring.cloud.gateway.routes[6].filters[0]=RewritePath=/v3/api-docs/helpdesk-ticket-service,/v3/api-docs  

# --- Device Management API Docs ---
spring.cloud.gateway.routes[7].id=device-management-api-docs
spring.cloud.gateway.routes[7].uri=lb://DEVICE-MANAGEMENT-SERVICE
spring.cloud.gateway.routes[7].predicates[0]=Path=/v3/api-docs/device-management-service
spring.cloud.gateway.routes[7].filters[0]=RewritePath=/v3/api-docs/device-management-service,/v3/api-docs 
# ========================================
# CORS global
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOriginPatterns=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].maxAge=3600
