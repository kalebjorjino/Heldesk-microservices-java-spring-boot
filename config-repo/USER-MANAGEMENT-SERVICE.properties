# Configuración para el User Management Service
server.port=8083

# Lee la clave secreta desde una variable de entorno llamada JWT_SECRET
app.jwt.secret=${JWT_SECRET}

# Tiempo de expiración del token (86400000 = 1 día)
app.jwt.expiration-ms=86400000

# Conexión a Eureka
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka

# Forzar hostname manualmente
spring.cloud.client.hostname=localhost

# Evitar que use la IP detectada automáticamente
eureka.instance.prefer-ip-address=false

# Forzar hostname manualmente (IMPORTANTE)
eureka.instance.hostname=localhost

